<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>THE BRIDGE :: RELOADED</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #overlay {
            position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #050b1a 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #00f2ff; z-index: 100; cursor: pointer; text-transform: uppercase;
        }
        #chat-ui {
            position: absolute; bottom: 20px; left: 20px; width: 320px;
            background: rgba(0,0,0,0.8); border: 1px solid #00f2ff; display: none;
            flex-direction: column; border-radius: 4px; z-index: 50;
        }
        #messages { height: 140px; overflow-y: auto; padding: 10px; color: #fff; font-size: 12px; border-bottom: 1px solid #333; }
        #chat-input { background: transparent; border: none; color: #00f2ff; padding: 10px; outline: none; }
        #status { position: absolute; top: 20px; left: 20px; color: #00f2ff; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>

<div id="status">CORE: ACTIVE | STREAMS: CONNECTED</div>
<div id="overlay">
    <h1 style="font-size: 3em; margin:0; text-shadow: 0 0 20px #00f2ff;">THE BRIDGE</h1>
    <p>Кликни для входа</p>
    <div style="font-size: 11px; opacity: 0.6; margin-top: 20px;">WASD - Движение | T - Чат</div>
</div>

<div id="chat-ui">
    <div id="messages"></div>
    <input type="text" id="chat-input" maxlength="50">
</div>

<script src="/socket.io/socket.io.js"></script>
<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // --- Переменные ---
    let myNick = "User_" + Math.floor(Math.random()*999);
    const keys = {};
    let isChatting = false;

    // --- Сцена ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x00020a, 0.02);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 35); // Ставим выше моста

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ReinhardToneMapping;
    document.body.appendChild(renderer.domElement);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.4, 0.8);
    composer.addPass(bloom);

    // --- Объекты ---
    scene.add(new THREE.AmbientLight(0x4040ff, 0.4));
    
    // Вода
    const water = new THREE.Mesh(new THREE.PlaneGeometry(300, 1000), new THREE.MeshStandardMaterial({ color: 0x000510, metalness: 0.9 }));
    water.rotation.x = -Math.PI/2;
    scene.add(water);

    // Мост
    const bridge = new THREE.Mesh(new THREE.BoxGeometry(14, 0.5, 100), new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8 }));
    bridge.position.y = 1.5;
    scene.add(bridge);

    // Арки
    for(let z = -40; z <= 40; z += 15) {
        const arch = new THREE.Mesh(new THREE.TorusGeometry(8, 0.1, 8, 30, Math.PI), new THREE.MeshBasicMaterial({ color: 0x00f2ff }));
        arch.position.set(0, 1.5, z);
        arch.rotation.x = Math.PI/2; arch.rotation.y = Math.PI/2;
        scene.add(arch);
    }

    // --- Мультиплеер ---
    const socket = io();
    const otherPlayers = {};
    const controls = new PointerLockControls(camera, document.body);

    document.getElementById('overlay').addEventListener('click', () => {
        myNick = prompt("Ваш ник:", myNick) || myNick;
        controls.lock();
        socket.emit('join-simulation', { nick: myNick });
        document.getElementById('overlay').style.display = 'none';
    });

    // Обработка клавиш (вынесена из animate)
    window.addEventListener('keydown', (e) => {
        keys[e.code] = true;
        if(e.code === 'KeyT' && !isChatting) {
            isChatting = true;
            document.getElementById('chat-ui').style.display = 'flex';
            document.getElementById('chat-input').focus();
            controls.unlock();
        }
    });
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    // Чат
    const chatInput = document.getElementById('chat-input');
    chatInput.addEventListener('keydown', (e) => {
        if(e.code === 'Enter' && chatInput.value !== '') {
            socket.emit('chatMessage', chatInput.value);
            chatInput.value = '';
            closeChat();
        }
        if(e.code === 'Escape') closeChat();
    });

    function closeChat() {
        isChatting = false;
        document.getElementById('chat-ui').style.display = 'none';
        controls.lock();
    }

    socket.on('chatMessage', (d) => {
        const div = document.createElement('div');
        div.innerHTML = `<span style="color:${d.color}">${d.nick}:</span> ${d.msg}`;
        document.getElementById('messages').appendChild(div);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    });

    // Аватары
    function createAvatar(info) {
        const g = new THREE.Group();
        const b = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 1), new THREE.MeshStandardMaterial({color: info.color}));
        b.position.y = 0.8; g.add(b);
        const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.font = '24px Arial'; ctx.textAlign = 'center';
        ctx.fillText(info.nick, 128, 40);
        const tex = new THREE.CanvasTexture(canvas);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map: tex}));
        sprite.position.y = 2.3; sprite.scale.set(2, 0.5, 1);
        g.add(sprite);
        return g;
    }

    socket.on('currentPlayers', (p) => {
        Object.keys(p).forEach(id => { if(id !== socket.id) { otherPlayers[id] = createAvatar(p[id]); scene.add(otherPlayers[id]); }});
    });
    socket.on('newPlayer', (d) => { otherPlayers[d.id] = createAvatar(d.info); scene.add(otherPlayers[d.id]); });
    socket.on('playerMoved', (d) => { if(otherPlayers[d.id]) otherPlayers[d.id].position.lerp(new THREE.Vector3(d.info.x, d.info.y-1.6, d.info.z), 0.2); });
    socket.on('playerDisconnected', (id) => { if(otherPlayers[id]) { scene.remove(otherPlayers[id]); delete otherPlayers[id]; }});

    // --- Цикл Анимации ---
    function animate() {
        requestAnimationFrame(animate);
        
        if (controls.isLocked && !isChatting) {
            const moveSpeed = 0.2;
            if (keys['KeyW']) controls.moveForward(moveSpeed);
            if (keys['KeyS']) controls.moveForward(-moveSpeed);
            if (keys['KeyA']) controls.moveRight(-moveSpeed);
            if (keys['KeyD']) controls.moveRight(moveSpeed);

            if (keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD']) {
                socket.emit('playerMovement', { x: camera.position.x, y: camera.position.y, z: camera.position.z });
            }
        }

        water.position.y = Math.sin(Date.now() * 0.001) * 0.05;
        composer.render();
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
